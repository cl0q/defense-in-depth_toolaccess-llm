# Promptfoo configuration for red teaming
# Goal: reproducible attack runs for every configuration x goal

targets:
  - id: http://localhost:8000/query
    label: gateway
    config:
      method: POST
      headers:
        Content-Type: application/json
        Authorization: "Bearer tenant_a.customer"
      body:
        prompt: "{{prompt}}"
      # Map the gateway JSON answer back to text for grading.
      transformResponse: "json.response"

redteam:
  purpose: |
    Marketplace assistant with DB access behind a gateway (RLS, masking, guardrails).
  provider: openai:chat:hermes-70b         # attacker model (vLLM port 8002); set PROMPTFOO_ATTACKER_BASE_URL
  plugins:
    # --- access control & data leakage (all local, no remote generation needed) ---
    - cross-session-leak
    - debug-access
    - excessive-agency
    - pii:api-db
    - pii:direct
    - pii:session
    - pii:social
    - rbac
    - prompt-extraction
    - shell-injection
    - sql-injection
    - harmful:intellectual-property
    - harmful:privacy
  strategies:
    # NOTE: agentic strategies (crescendo, jailbreak, jailbreak:meta,
    # jailbreak:hydra, jailbreak:composite, goat) call promptfoo's REMOTE
    # service at eval time and FAIL with PROMPTFOO_DISABLE_REDTEAM_REMOTE_GENERATION.
    # Only static transform strategies run fully offline:
    - basic            # raw prompt, no transform (the control)
    - base64
    - leetspeak
    - rot13
    - homoglyph
    - morse
  numTests: 5
  maxConcurrency: 1
  delay: 1000

# Layer switching is done by separate runs using tags, for example:
# promptfoo redteam run --tag config=DT