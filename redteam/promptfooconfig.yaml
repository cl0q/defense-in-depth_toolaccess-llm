# Promptfoo Configuration for Red Teaming
# Ziel: Reproduzierbare Angriffsläufe gegen alle Konfigurationen × Ziele

targets:
  - id: https://localhost:8000/query
    label: gateway
    config:
      method: POST
      headers:
        Content-Type: application/json
        Authorization: "Bearer <test-token-for-tenant_a-customer>"
      body:
        prompt: "{{prompt}}"
      # map the gateway's JSON answer back to text for grading:
      transformResponse: "json.response"

redteam:
  purpose: |
    Marketplace assistant with DB access behind a gateway (RLS, masking, guardrails).
  provider: openai:chat:qwen-70b           # attacker; point apiBaseUrl at local vLLM
  plugins:
    - owasp:llm:01
    - owasp:llm:02
    - owasp:llm:05
    - owasp:llm:06
  strategies:
    - jailbreak:meta
    - jailbreak:hydra
    - crescendo
  numTests: 5
  maxConcurrency: 1
  delay: 1000

# Configuration for different defense layers
# Note: promptfoo doesn't support layer switching via configs; 
# we'll need to run separate tests per layer using --tag config=...