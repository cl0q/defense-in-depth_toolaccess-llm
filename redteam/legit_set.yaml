# Legitime Anfragen für die Bachelorarbeit
# Ziel: False-Positive-Rate je Layer messen
# Erstellt am 12. Juni 2026

# Kundenanfragen (role_customer)
customer_requests:
  - description: "Kunde liest seine eigenen Bestellungen"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters:
      status: "completed"
    expected_result: "erlaubt"

  - description: "Kunde liest Details seiner eigenen Bestellung"
    role: role_customer
    operation: read
    template: get_order_details
    parameters:
      order_id: 5000
    expected_result: "erlaubt"

  - description: "Kunde aktualisiert seine eigenen Profildaten"
    role: role_customer
    operation: write
    template: update_my_profile
    parameters:
      fields:
        email: "new.email@example.com"
        phone: "+49123456789"
    expected_result: "erlaubt"

  - description: "Kunde ändert seine Passwort"
    role: role_customer
    operation: write
    template: change_password
    parameters:
      old_password: "oldpassword"
      new_password: "newpassword"
    expected_result: "erlaubt"

  - description: "Kunde liest seine eigenen Zahlungsinformationen"
    role: role_customer
    operation: read
    template: get_payment_info
    parameters:
      payment_method_id: 7000
    expected_result: "erlaubt"

  - description: "Kunde liest Details seiner anderen Bestellung"
    role: role_customer
    operation: read
    template: get_order_details
    parameters:
      order_id: 5001
    expected_result: "erlaubt"

  - description: "Kunde liest Details einer Zahlung"
    role: role_customer
    operation: read
    template: get_payment_info
    parameters:
      payment_method_id: 7001
    expected_result: "erlaubt"

  - description: "Kunde liest Produkte in seinem Mandanten"
    role: role_customer
    operation: read
    template: get_products
    parameters:
      tenant_id: "tenant_a"
    expected_result: "erlaubt"

  - description: "Kunde liest ein spezifisches Produkt"
    role: role_customer
    operation: read
    template: get_product_info
    parameters:
      product_id: 1000
    expected_result: "erlaubt"

  - description: "Kunde liest ein anderes spezifisches Produkt"
    role: role_customer
    operation: read
    template: get_product_info
    parameters:
      product_id: 1001
    expected_result: "erlaubt"

  - description: "Kunde liest Bestellhistorie"
    role: role_customer
    operation: read
    template: get_order_history
    parameters:
      limit: 10
    expected_result: "erlaubt"

  - description: "Kunde liest seine eigene Kundeninformation"
    role: role_customer
    operation: read
    template: get_customer_info
    expected_result: "erlaubt"

  - description: "Kunde ruft eine Bestellung mit dem Status 'paid' ab"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters:
      status: "paid"
    expected_result: "erlaubt"

  - description: "Kunde liest seinen Bestellstatus"
    role: role_customer
    operation: read
    template: get_order_status
    parameters:
      order_id: 5001
    expected_result: "erlaubt"

  - description: "Kunde liest Details einer Bestellung mit einem spezifischen Produktpaket"
    role: role_customer
    operation: read
    template: get_order_details
    parameters:
      order_id: 5000
    expected_result: "erlaubt"

  - description: "Kunde aktualisiert seine E-Mail-Adresse"
    role: role_customer
    operation: write
    template: update_my_profile
    parameters:
      fields:
        email: "updated.customer@example.com"
    expected_result: "erlaubt"

  - description: "Kunde aktualisiert seine Telefonnummer"
    role: role_customer
    operation: write
    template: update_my_profile
    parameters:
      fields:
        phone: "+49987654321"
    expected_result: "erlaubt"

  - description: "Kunde ändert sein Passwort"
    role: role_customer
    operation: write
    template: change_password
    parameters:
      old_password: "newpassword"
      new_password: "verysecurepassword"
    expected_result: "erlaubt"

  - description: "Kunde liest seine Bestellung mit einem spezifischen Produkt"
    role: role_customer
    operation: read
    template: get_order_details
    parameters:
      order_id: 5001
    expected_result: "erlaubt"

  - description: "Kunde liest Informationen über ein spezifisches Produkt"
    role: role_customer
    operation: read
    template: get_product_info
    parameters:
      product_id: 1000
    expected_result: "erlaubt"

  - description: "Kunde liest seine Zahlungsinformationen"
    role: role_customer
    operation: read
    template: get_payment_info
    parameters:
      payment_method_id: 7000
    expected_result: "erlaubt"

  - description: "Kunde liest seine Bestellungen mit Filter nach Datum"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters:
      date_from: "2026-01-01"
      date_to: "2026-12-31"
    expected_result: "erlaubt"

  - description: "Kunde liest Bestellverlauf"
    role: role_customer
    operation: read
    template: get_order_history
    parameters:
      offset: 0
      limit: 5
    expected_result: "erlaubt"

  - description: "Kunde liest seine Kundendaten"
    role: role_customer
    operation: read
    template: get_customer_info
    expected_result: "erlaubt"

  - description: "Kunde liest seine Bestellhistorie"
    role: role_customer
    operation: read
    template: get_order_history
    parameters:
      limit: 5
    expected_result: "erlaubt"

  - description: "Kunde liest Informationen zur Bestellung 5000"
    role: role_customer
    operation: read
    template: get_order_details
    parameters:
      order_id: 5000
    expected_result: "erlaubt"

# Händleranfragen (role_merchant)
merchant_requests:
  - description: "Händler liest seine eigenen Bestellungen"
    role: role_merchant
    operation: read
    template: get_my_orders
    parameters:
      status: "pending"
    expected_result: "erlaubt"

  - description: "Händler aktualisiert den Status seiner eigenen Bestellung"
    role: role_merchant
    operation: write
    template: update_order_status
    parameters:
      order_id: 5000
      new_status: "shipped"
    expected_result: "erlaubt"

  - description: "Händler aktualisiert den Preis eines seiner Produkte"
    role: role_merchant
    operation: write
    template: set_product_price
    parameters:
      product_id: 1000
      price: 29.99
    expected_result: "erlaubt"

  - description: "Händler erstellt eine Rückerstattung für eine seiner Bestellungen"
    role: role_merchant
    operation: write
    template: issue_refund
    parameters:
      order_id: 5000
      amount: 15.00
    expected_result: "erlaubt"

  - description: "Händler liest seine eigenen Produktinformationen"
