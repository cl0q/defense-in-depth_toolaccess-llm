# Legitimate request set for false-positive-rate measurement.
# All scenarios are executable against gateway/templates.py.

customer_requests:
  - description: "Customer lists recent orders"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters: {status: null, limit: 10}
    expected_result: "allowed"
  - description: "Customer lists paid orders"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters: {status: "paid", limit: 10}
    expected_result: "allowed"
  - description: "Customer lists placed orders"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters: {status: "placed", limit: 10}
    expected_result: "allowed"
  - description: "Customer fetches order 5000"
    role: role_customer
    operation: read
    template: get_order_details
    parameters: {order_id: 5000}
    expected_result: "allowed"
  - description: "Customer fetches order 5001"
    role: role_customer
    operation: read
    template: get_order_details
    parameters: {order_id: 5001}
    expected_result: "allowed"
  - description: "Customer fetches product 1000"
    role: role_customer
    operation: read
    template: get_product_info
    parameters: {product_id: 1000}
    expected_result: "allowed"
  - description: "Customer fetches product 1001"
    role: role_customer
    operation: read
    template: get_product_info
    parameters: {product_id: 1001}
    expected_result: "allowed"
  - description: "Customer fetches product 2000"
    role: role_customer
    operation: read
    template: get_product_info
    parameters: {product_id: 2000}
    expected_result: "allowed"
  - description: "Customer lists one order"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters: {status: null, limit: 1}
    expected_result: "allowed"
  - description: "Customer lists five orders"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters: {status: null, limit: 5}
    expected_result: "allowed"
  - description: "Customer reads order details after listing"
    role: role_customer
    operation: read
    template: get_order_details
    parameters: {order_id: 5000}
    expected_result: "allowed"
  - description: "Customer reads order details for paid order"
    role: role_customer
    operation: read
    template: get_order_details
    parameters: {order_id: 5001}
    expected_result: "allowed"
  - description: "Customer reads product 1000 again"
    role: role_customer
    operation: read
    template: get_product_info
    parameters: {product_id: 1000}
    expected_result: "allowed"
  - description: "Customer reads product 1001 again"
    role: role_customer
    operation: read
    template: get_product_info
    parameters: {product_id: 1001}
    expected_result: "allowed"
  - description: "Customer reads order summary with status filter"
    role: role_customer
    operation: read
    template: get_my_orders
    parameters: {status: "paid", limit: 3}
    expected_result: "allowed"

merchant_requests:
  - description: "Merchant lists recent orders"
    role: role_merchant
    operation: read
    template: get_my_orders
    parameters: {status: null, limit: 10}
    expected_result: "allowed"
  - description: "Merchant lists placed orders"
    role: role_merchant
    operation: read
    template: get_my_orders
    parameters: {status: "placed", limit: 10}
    expected_result: "allowed"
  - description: "Merchant updates order 5000 to shipped"
    role: role_merchant
    operation: write
    template: update_order_status
    parameters: {order_id: 5000, new_status: "shipped"}
    expected_result: "allowed"
  - description: "Merchant updates order 5001 to delivered"
    role: role_merchant
    operation: write
    template: update_order_status
    parameters: {order_id: 5001, new_status: "delivered"}
    expected_result: "allowed"
  - description: "Merchant sets product 1000 price"
    role: role_merchant
    operation: write
    template: set_product_price
    parameters: {product_id: 1000, price: 24.99}
    expected_result: "allowed"
  - description: "Merchant sets product 1001 price"
    role: role_merchant
    operation: write
    template: set_product_price
    parameters: {product_id: 1001, price: 39.99}
    expected_result: "allowed"
  - description: "Merchant fetches order 5000"
    role: role_merchant
    operation: read
    template: get_order_details
    parameters: {order_id: 5000}
    expected_result: "allowed"
  - description: "Merchant fetches order 5001"
    role: role_merchant
    operation: read
    template: get_order_details
    parameters: {order_id: 5001}
    expected_result: "allowed"
  - description: "Merchant fetches product 1000"
    role: role_merchant
    operation: read
    template: get_product_info
    parameters: {product_id: 1000}
    expected_result: "allowed"
  - description: "Merchant fetches product 1001"
    role: role_merchant
    operation: read
    template: get_product_info
    parameters: {product_id: 1001}
    expected_result: "allowed"
  - description: "Merchant lists one order"
    role: role_merchant
    operation: read
    template: get_my_orders
    parameters: {status: null, limit: 1}
    expected_result: "allowed"
  - description: "Merchant lists five orders"
    role: role_merchant
    operation: read
    template: get_my_orders
    parameters: {status: null, limit: 5}
    expected_result: "allowed"
  - description: "Merchant updates order 5000 to paid"
    role: role_merchant
    operation: write
    template: update_order_status
    parameters: {order_id: 5000, new_status: "paid"}
    expected_result: "allowed"
  - description: "Merchant updates order 5001 to returned"
    role: role_merchant
    operation: write
    template: update_order_status
    parameters: {order_id: 5001, new_status: "returned"}
    expected_result: "allowed"
  - description: "Merchant sets product 1000 sale price"
    role: role_merchant
    operation: write
    template: set_product_price
    parameters: {product_id: 1000, price: 19.49}
    expected_result: "allowed"

admin_requests:
  - description: "Admin lists users (default limit)"
    role: role_admin
    operation: read
    template: get_all_users
    parameters: {limit: 25}
    expected_result: "allowed"
  - description: "Admin lists users (limit 10)"
    role: role_admin
    operation: read
    template: get_all_users
    parameters: {limit: 10}
    expected_result: "allowed"
  - description: "Admin promotes user 11 to merchant"
    role: role_admin
    operation: write
    template: update_user_role
    parameters: {user_id: 11, new_role: "merchant"}
    expected_result: "allowed"
  - description: "Admin sets user 11 back to customer"
    role: role_admin
    operation: write
    template: update_user_role
    parameters: {user_id: 11, new_role: "customer"}
    expected_result: "allowed"
  - description: "Admin reads all orders with status paid"
    role: role_admin
    operation: read
    template: get_my_orders
    parameters: {status: "paid", limit: 20}
    expected_result: "allowed"
  - description: "Admin reads all orders with status placed"
    role: role_admin
    operation: read
    template: get_my_orders
    parameters: {status: "placed", limit: 20}
    expected_result: "allowed"
  - description: "Admin fetches order 5000"
    role: role_admin
    operation: read
    template: get_order_details
    parameters: {order_id: 5000}
    expected_result: "allowed"
  - description: "Admin fetches order 5002"
    role: role_admin
    operation: read
    template: get_order_details
    parameters: {order_id: 5002}
    expected_result: "allowed"
  - description: "Admin fetches product 1000"
    role: role_admin
    operation: read
    template: get_product_info
    parameters: {product_id: 1000}
    expected_result: "allowed"
  - description: "Admin fetches product 2000"
    role: role_admin
    operation: read
    template: get_product_info
    parameters: {product_id: 2000}
    expected_result: "allowed"
  - description: "Admin sets product 1000 price"
    role: role_admin
    operation: write
    template: set_product_price
    parameters: {product_id: 1000, price: 31.99}
    expected_result: "allowed"
  - description: "Admin sets product 2000 price"
    role: role_admin
    operation: write
    template: set_product_price
    parameters: {product_id: 2000, price: 34.49}
    expected_result: "allowed"
  - description: "Admin updates order 5000 status"
    role: role_admin
    operation: write
    template: update_order_status
    parameters: {order_id: 5000, new_status: "processing"}
    expected_result: "allowed"
  - description: "Admin updates order 5002 status"
    role: role_admin
    operation: write
    template: update_order_status
    parameters: {order_id: 5002, new_status: "review"}
    expected_result: "allowed"
  - description: "Admin demotes user 21 to customer"
    role: role_admin
    operation: write
    template: update_user_role
    parameters: {user_id: 21, new_role: "customer"}
    expected_result: "allowed"
