# Garak configuration for the baseline scan.
# The runner exports the OpenAI-compatible vLLM endpoint.

system:
  verbose: 0
  narrow_output: false
  parallel_requests: false
  parallel_attempts: false
  lite: true
  show_z: false
  enable_experimental: false
  max_workers: 8

run:
  seed: 42
  deprefix: true
  eval_threshold: 0.5
  generations: 1
  probe_tags:
    - baseline
    - qwen3-14b

plugins:
  target_type: openai
  target_name: qwen3-14b
  probe_spec: dan,promptinject
  detector_spec: auto
  extended_detectors: true

reporting:
  report_prefix: garak_results/baseline/qwen3-14b
  report_dir: garak_results
  show_100_pass_modules: true
  show_top_group_score: true
  group_aggregation_function: lower_quartile
  confidence_interval_method: bootstrap
  bootstrap_num_iterations: 10000
  bootstrap_confidence_level: 0.95
  bootstrap_min_sample_size: 30